<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毛中特模拟考试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei","PingFang SC",sans-serif;background:#f5f0eb;color:#333;line-height:1.7}
/* 顶栏 */
.topbar{position:sticky;top:0;z-index:100;background:#b22222;color:#fff;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.2);flex-wrap:wrap;gap:8px}
.topbar h1{font-size:1.15em;font-weight:600}
.topbar .info{font-size:.82em;opacity:.85}
.topbar .timer{font-size:1.25em;font-weight:bold;font-variant-numeric:tabular-nums;min-width:100px;text-align:right}
.topbar .timer.warning{color:#ffcc00;animation:blink 1s infinite}
.topbar .timer.danger{color:#ff8888;animation:blink .5s infinite}
@keyframes blink{50%{opacity:.5}}
/* 进度条 */
.progress-wrap{background:#fff;padding:8px 20px;border-bottom:1px solid #e0d5c7;position:sticky;top:58px;z-index:99}
.progress-bar{height:6px;background:#e0d5c7;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#b22222;transition:width .3s;border-radius:3px}
.progress-text{font-size:.8em;color:#888;margin-top:2px}
/* 主体 */
.container{max-width:920px;margin:0 auto;padding:8px 16px 60px}
/* 题型标题 */
.section-title{background:#fff;border-left:4px solid #b22222;padding:10px 16px;margin:16px 0 10px;font-size:1.05em;font-weight:700;color:#b22222;border-radius:0 8px 8px 0}
/* 题目卡片 */
.q-card{background:#fff;border-radius:10px;padding:18px 20px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1.5px solid #e8e0d5;transition:border-color .2s,background .2s}
.q-card.correct{border-color:#52c41a;background:#f6ffed}
.q-card.wrong{border-color:#ff4d4f;background:#fff2f0}
.q-num{font-weight:700;color:#b22222;margin-right:4px}
.q-status{display:inline-block;margin-left:4px;font-size:.9em;opacity:0;transition:opacity .2s}
.q-status.show{opacity:1}
.q-text{font-size:.95em;display:inline}
.q-feedback{display:none;font-size:.88em;margin-top:6px;padding:8px 12px;border-radius:6px}
.q-feedback.show{display:block}
.q-feedback.correct-fb{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f}
.q-feedback.wrong-fb{background:#fff2f0;color:#cf1322;border:1px solid #ffa39e}
/* 选项 */
.options{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.opt-label{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.opt-label:hover{background:#fdf5f5}
.opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:#f0ebe0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.82em;color:#888;transition:all .15s}
input:checked+.opt-letter{background:#b22222;color:#fff}
.opt-text{flex:1;font-size:.92em}
input[type="radio"],input[type="checkbox"]{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
/* 即时反馈高亮选项 */
.opt-label.correct-opt{border-color:#52c41a;background:#f6ffed}
.opt-label.correct-opt .opt-letter{background:#52c41a;color:#fff}
.opt-label.wrong-opt{border-color:#ff4d4f;background:#fff2f0}
.opt-label.wrong-opt .opt-letter{background:#ff4d4f;color:#fff}
/* 判断题 */
.tf-group{display:flex;gap:12px;margin-top:6px}
.tf-btn{flex:1;text-align:center;padding:10px;border-radius:6px;cursor:pointer;border:2px solid #e0d5c7;font-size:.95em;transition:all .15s;background:#fff}
.tf-btn:hover{border-color:#b22222;background:#fdf5f5}
.tf-btn.selected{border-color:#b22222;background:#b22222;color:#fff;font-weight:600}
.tf-btn.correct-tf{border-color:#52c41a!important;background:#52c41a!important;color:#fff!important}
.tf-btn.wrong-tf{border-color:#ff4d4f!important;background:#ff4d4f!important;color:#fff!important}
/* 按钮 */
.btn-row{text-align:center;margin:24px 0;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:12px 40px;font-size:1.05em;border:none;border-radius:8px;cursor:pointer;font-weight:600;transition:all .2s;letter-spacing:1px}
.btn-submit{background:#b22222;color:#fff}
.btn-submit:hover{background:#8b1a1a;transform:translateY(-1px);box-shadow:0 4px 12px rgba(178,34,34,.3)}
.btn-submit:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:#fff;color:#b22222;border:2px solid #b22222}
.btn-outline:hover{background:#fdf5f5}
/* 结果弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:550px;width:90%;max-height:85vh;overflow-y:auto;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:1.5em;margin-bottom:12px}
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:2em;font-weight:800;color:#fff;flex-direction:column;line-height:1.2}
.score-circle small{font-size:.35em;font-weight:400}
.score-great{background:#52c41a}.score-good{background:#1890ff}.score-ok{background:#faad14}.score-bad{background:#ff4d4f}
.score-detail{font-size:.9em;color:#666;line-height:2;margin:10px 0}
/* 响应式 */
@media(max-width:600px){.topbar{padding:8px 12px}.topbar h1{font-size:.95em}.q-card{padding:12px}.btn{padding:10px 28px;font-size:1em}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>📝 毛中特模拟考试</h1>
    <div class="info">单选50题 · 多选30题 · 判断20题 · 共100题</div>
  </div>
  <div class="timer" id="timer">⏱ 90:00</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">已答 0 / 100 题 · 正确 0 题</div>
</div>

<div class="container" id="questionContainer"></div>

<div class="btn-row">
  <button class="btn btn-submit" id="btnSubmit" onclick="submitExam()">📋 交卷看总分</button>
  <button class="btn btn-outline" onclick="location.reload()">🔄 重新组题</button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>

var TOTAL_TIME = 90 * 60;
var timeLeft = TOTAL_TIME;
var timerInterval = null;
var examQuestions = { single: [], multi: [], tf: [] };
var submitted = false;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}
function randomPick(arr, n) { return shuffle(arr).slice(0, n); }

function buildExam() {
  examQuestions.single = randomPick(QUESTION_BANK.s, 50);
  examQuestions.multi = randomPick(QUESTION_BANK.m, 30);
  examQuestions.tf = randomPick(QUESTION_BANK.t, 20);
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderExam() {
  var html = '', qi = 0;

  html += '<div class="section-title" id="secSingle">一、单项选择题（共50题，每题1分）</div>';
  examQuestions.single.forEach(function(q, i) { qi++; html += renderSingle(q, qi); });

  html += '<div class="section-title" id="secMulti">二、多项选择题（共30题，每题2分）</div>';
  examQuestions.multi.forEach(function(q, i) { qi++; html += renderMulti(q, qi); });

  html += '<div class="section-title" id="secTF">三、判断题（共20题，每题1分）</div>';
  examQuestions.tf.forEach(function(q, i) { qi++; html += renderTF(q, qi); });

  document.getElementById('questionContainer').innerHTML = html;
  bindEvents();
}

function renderSingle(q, num) {
  var labels = 'ABCD';
  var h = '<div class="q-card" id="qCard-' + num + '" data-answered="0">';
  h += '<div><span class="q-num">' + num + '.</span><span class="q-status" id="qStatus-' + num + '"></span>';
  h += '<span class="q-text">' + escapeHtml(q.q) + '</span></div>';
  h += '<div class="q-feedback" id="qFb-' + num + '"></div>';
  h += '<div class="options">';
  for (var i = 0; i < 4; i++) {
    if (q.o[i]) {
      h += '<label class="opt-label" id="opt-' + num + '-' + labels[i] + '">';
      h += '<input type="radio" name="q' + num + '" value="' + labels[i] + '" onchange="checkSingle(' + num + ', \'' + labels[i] + '\', \'' + q.a + '\')">';
      h += '<span class="opt-letter">' + labels[i] + '</span>';
      h += '<span class="opt-text">' + escapeHtml(q.o[i]) + '</span>';
      h += '</label>';
    }
  }
  h += '</div></div>';
  return h;
}

function renderMulti(q, num) {
  var labels = 'ABCD';
  var h = '<div class="q-card" id="qCard-' + num + '" data-answered="0">';
  h += '<div><span class="q-num">' + num + '.</span><span class="q-status" id="qStatus-' + num + '"></span>';
  h += '<span class="q-text">' + escapeHtml(q.q) + '</span></div>';

  for (var i = 0; i < 4; i++) {
    if (q.o[i]) {
      h += '<label class="opt-label" id="opt-' + num + '-' + labels[i] + '">';
      h += '<input type="checkbox" name="q' + num + '" value="' + labels[i] + '" onchange="checkMulti(' + num + ', \'' + q.a + '\')">';
      h += '<span class="opt-letter">' + labels[i] + '</span>';
      h += '<span class="opt-text">' + escapeHtml(q.o[i]) + '</span>';

function renderTF(q, num) {
  var h = '<div class="q-card" id="qCard-' + num + '" data-answered="0">';
  h += '<div><span class="q-num">' + num + '.</span><span class="q-status" id="qStatus-' + num + '"></span>';
  h += '<span class="q-text">' + escapeHtml(q.q) + '</span></div>';
  h += '<div class="q-feedback" id="qFb-' + num + '"></div>';
  h += '<div class="tf-group">';
  h += '<div class="tf-btn" id="tf-' + num + '-√" onclick="checkTF(' + num + ', \'√\', \'' + q.a + '\')">✅ 正确</div>';
  h += '<div class="tf-btn" id="tf-' + num + '-×" onclick="checkTF(' + num + ', \'×\', \'' + q.a + '\')">❌ 错误</div>';
  h += '</div></div>';
  return h;
}

// ========== 即时反馈逻辑 ==========

function markCard(num, isCorrect, userAns, correctAns, type) {
  var card = document.getElementById('qCard-' + num);
  var status = document.getElementById('qStatus-' + num);
  var fb = document.getElementById('qFb-' + num);

  // 标记卡片
  card.classList.remove('correct', 'wrong');
  card.classList.add(isCorrect ? 'correct' : 'wrong');
  card.dataset.answered = '1';

  // 状态图标
  status.textContent = isCorrect ? '✅' : '❌';
  status.classList.add('show');

  // 反馈文字
  fb.classList.remove('correct-fb', 'wrong-fb', 'show');
  if (isCorrect) {
    fb.textContent = '回答正确！' + (type === 'multi' ? '' : '');
    fb.classList.add('correct-fb', 'show');
  } else {
    var msg = '回答错误！正确答案是：' + correctAns;
    if (type === 'single') {
      msg += '（你选了：' + (userAns || '未选') + '）';
    } else if (type === 'multi') {
      msg += '（你选了：' + (userAns || '未选') + '）';
    } else {
      msg += '（你选了：' + (userAns || '未选') + '）';
    }
    fb.textContent = msg;
    fb.classList.add('wrong-fb', 'show');
  }

  updateAnsweredStatus();
}

function highlightOptions(num, correctAns, userAns, type, optCount) {
  var labels = 'ABCD';
  // 清除之前的样式
  for (var i = 0; i < optCount; i++) {
    var opt = document.getElementById('opt-' + num + '-' + labels[i]);
    if (opt) {
      opt.classList.remove('correct-opt', 'wrong-opt');
    }
  }

  // 高亮正确选项
  for (var j = 0; j < correctAns.length; j++) {
    var cOpt = document.getElementById('opt-' + num + '-' + correctAns[j]);
    if (cOpt) cOpt.classList.add('correct-opt');
  }

  // 高亮错误选项（用户选错的）
  if (type === 'single' && userAns && userAns !== correctAns) {
    var wOpt = document.getElementById('opt-' + num + '-' + userAns);
    if (wOpt && !correctAns.includes(userAns)) wOpt.classList.add('wrong-opt');
  } else if (type === 'multi') {
    for (var k = 0; k < userAns.length; k++) {
      if (!correctAns.includes(userAns[k])) {
        var wOpt2 = document.getElementById('opt-' + num + '-' + userAns[k]);
        if (wOpt2) wOpt2.classList.add('wrong-opt');
      }
    }
  }
}

function checkSingle(num, userAns, correctAns) {
  if (submitted) return;
  var isCorrect = userAns === correctAns;
  markCard(num, isCorrect, userAns, correctAns, 'single');
  highlightOptions(num, correctAns, userAns, 'single', 4);

  // 判断题错误选项也要高亮（无选项，在tf btn处处理）
}

function checkMulti(num, correctAns) {
  if (submitted) return;
  var cbs = document.querySelectorAll('input[name="q' + num + '"]:checked');
  var userAns = [];
  cbs.forEach(function(cb) { userAns.push(cb.value); });
  userAns.sort();
  var userStr = userAns.join('');
  var isCorrect = userStr === correctAns;

  // 只有选了至少一个才显示反馈
  if (userStr.length === 0) {
    // 清空反馈
    var card = document.getElementById('qCard-' + num);
    card.classList.remove('correct', 'wrong');
    card.dataset.answered = '0';
    document.getElementById('qStatus-' + num).classList.remove('show');
    document.getElementById('qFb-' + num).classList.remove('correct-fb', 'wrong-fb', 'show');
    var labels = 'ABCD';
    for (var i = 0; i < 4; i++) {
      var opt = document.getElementById('opt-' + num + '-' + labels[i]);
      if (opt) opt.classList.remove('correct-opt', 'wrong-opt');
    }
    updateAnsweredStatus();
    return;
  }

  markCard(num, isCorrect, userStr, correctAns, 'multi');
  highlightOptions(num, correctAns, userStr, 'multi', 4);
}

function checkTF(num, userAns, correctAns) {
  if (submitted) return;
  // 先清除所有 tf-btn 的样式
  document.getElementById('tf-' + num + '-√').classList.remove('selected', 'correct-tf', 'wrong-tf');
  document.getElementById('tf-' + num + '-×').classList.remove('selected', 'correct-tf', 'wrong-tf');

  // 标记选中
  document.getElementById('tf-' + num + '-' + userAns).classList.add('selected');

  var isCorrect = userAns === correctAns;

  // 高亮正确按钮
  document.getElementById('tf-' + num + '-' + correctAns).classList.add('correct-tf');
  // 如果选错，高亮错误按钮
  if (!isCorrect) {
    document.getElementById('tf-' + num + '-' + userAns).classList.add('wrong-tf');
  }

  markCard(num, isCorrect, userAns, correctAns, 'tf');
}

// ========== 进度更新 ==========
function updateAnsweredStatus() {
  if (submitted) return;
  var total = 100;
  var answered = 0;
  var correct = 0;

  for (var i = 1; i <= 100; i++) {
    var card = document.getElementById('qCard-' + i);
    if (card && card.dataset.answered === '1') {
      answered++;
      if (card.classList.contains('correct')) correct++;
    }
  }

  var pct = Math.round(answered / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = '已答 ' + answered + ' / ' + total + ' 题 · 正确 ' + correct + ' 题';
}

// ========== 计时器 ==========
function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
}

function updateTimerDisplay() {
  var m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  var el = document.getElementById('timer');
  el.textContent = '⏱ ' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  el.classList.remove('warning', 'danger');
  if (timeLeft <= 300) el.classList.add('danger');
  else if (timeLeft <= 900) el.classList.add('warning');
}

// ========== 交卷 ==========
function submitExam() {
  if (submitted) return;
  if (timerInterval) clearInterval(timerInterval);

  var allAnswered = 0;
  for (var i = 1; i <= 100; i++) {
    var card = document.getElementById('qCard-' + i);
    if (card && card.dataset.answered === '1') allAnswered++;
  }
  var unconfirmed = 100 - allAnswered;
  if (unconfirmed > 0 && timeLeft > 0) {
    if (!confirm('你还有 ' + unconfirmed + ' 道题未作答，确定交卷吗？')) {
      startTimer(); return;
    }
  }

  submitted = true;
  document.getElementById('btnSubmit').disabled = true;

  // 统计分数
  var totalScore = 0, maxScore = 0;
  var sCorrect = 0, mCorrect = 0, tCorrect = 0;

  for (var i = 1; i <= 50; i++) {
    var card = document.getElementById('qCard-' + i);
    maxScore += 1;
    if (card && card.classList.contains('correct')) { totalScore += 1; sCorrect++; }
  }
  for (var i = 51; i <= 80; i++) {
    var card2 = document.getElementById('qCard-' + i);
    maxScore += 2;
    if (card2 && card2.classList.contains('correct')) { totalScore += 2; mCorrect++; }
  }
  for (var i = 81; i <= 100; i++) {
    var card3 = document.getElementById('qCard-' + i);
    maxScore += 1;
    if (card3 && card3.classList.contains('correct')) { totalScore += 1; tCorrect++; }
  }

  showResult(totalScore, maxScore, sCorrect, mCorrect, tCorrect);
}

function showResult(score, max, sc, mc, tc) {
  var pct = Math.round(score / max * 100);
  var cls, grade;
  if (pct >= 90) { cls = 'score-great'; grade = '优秀'; }
  else if (pct >= 75) { cls = 'score-good'; grade = '良好'; }
  else if (pct >= 60) { cls = 'score-ok'; grade = '及格'; }
  else { cls = 'score-bad'; grade = '不及格'; }

  var used = TOTAL_TIME - timeLeft;
  var um = Math.floor(used / 60), us = used % 60;

  var html = '<h2>📊 考试成绩</h2>';
  html += '<div class="score-circle ' + cls + '">' + score + '<small>/ ' + max + '</small></div>';
  html += '<h3 style="color:#b22222">' + grade + ' (' + pct + '分)</h3>';
  html += '<div class="score-detail">';
  html += '正确 <b>' + (sc + mc + tc) + '</b> 题，错误 <b>' + (100 - sc - mc - tc) + '</b> 题<br>';
  html += '单选：<b>' + sc + '/50</b> | 多选：<b>' + mc + '/30</b> | 判断：<b>' + tc + '/20</b><br>';
  html += '用时：' + um + '分' + us + '秒';
  html += '</div>';
  html += '<button class="btn btn-outline" onclick="location.reload()">🔄 重新考试</button>';

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ========== 快捷键 ==========
document.addEventListener('keydown', function(e) {
  if (submitted) return;
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); submitExam(); }
});

// ========== 初始化 ==========
function bindEvents() { /* 事件已内联在onchange/onclick中 */ }

function init() {
  buildExam();
  renderExam();
  startTimer();
}

window.addEventListener('DOMContentLoaded', init);
</script>
